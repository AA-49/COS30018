# =============================================================
#  COS30018 Automated Negotiation Platform — Default Config
# =============================================================

# ── Agent counts ──────────────────────────────────────────────
dealer.count=3
buyer.count=5

# ── Broker (KA) settings ──────────────────────────────────────
# Fixed fee charged per facilitated negotiation session (RM)
broker.fixedFee=500.00
# Commission rate on deal price (0.02 = 2%)
broker.commissionRate=0.02

# ── Negotiation settings (used by Basic v2 auto-buyer) ────────
# Maximum number of rounds before auto-buyer walks away
negotiation.maxRounds=10
# Strategy for auto-buyer: concession | boulware
negotiation.buyerStrategy=concession
